<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말티즈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f8ebe4, #fff7f2);
      overflow-x: hidden;
      color: #4b4b4b;
      line-height: 1.6;
    }

    header {
      width: 100%;
      padding: 18px 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f0d9cf;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #d48c8c;
      letter-spacing: 2px;
    }

    html {
      scroll-behavior: smooth;
    }

    nav a {
      text-decoration: none;
      color: #555;
      margin-left: 25px;
      font-size: 15px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #b18b76;
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 140px 8% 60px;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .text-box {
      flex: 1;
      min-width: 300px;
    }

    .text-box h1 {
      font-size: 70px;
      font-weight: 800;
      color: #d18b8b;
      margin-bottom: 18px;
      line-height: 1.1;
    }

    .text-box p {
      margin-bottom: 18px;
      color: #666;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 13px 30px;
      background-color: #ffb3b3;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255,179,179,0.4);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff9292;
    }

    .image-box {
      flex: 1;
      min-width: 320px;
      text-align: center;
    }

    .image-box img {
      width: 100%;
      max-width: 470px;
      border-radius: 30px;
      border: 8px solid white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .small-gallery {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .small-gallery img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
    }

    section {
      padding: 120px 8% 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .section-title {
      font-size: 32px;
      margin-bottom: 25px;
      color: #6d574d;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: rgba(255,255,255,0.92);
      padding: 28px;
      border-radius: 25px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card h3 {
      margin-bottom: 12px;
      color: #7b675d;
    }

    footer {
      text-align: center;
      padding: 25px;
      background-color: #e8dfd8;
      color: #666;
      margin-top: 40px;
    }

    @media screen and (max-width: 768px) {
      .text-box h1 {
        font-size: 42px;
      }

      nav a {
        margin-left: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<header style="text-align:center; padding:30px;">
  <h1 style="font-size:50px; color:#e58f8f;">🐶 말티즈</h1>
</header>

<div class="container">

  <div class="main-card">
    <div class="main-text">
      <h2>귀엽고 사랑스러운 말티즈</h2>
      <p>부산 날씨 ☀️ 23°C</p>
      <p>작고 애교 많은 반려견 말티즈를 소개하는 홈페이지입니다.</p>
    </div>

    <img src="./dog1.png" alt="메인 말티즈 사진">
  </div>

  <div class="card-grid">

    <div class="card">
      <img src="./dog2.png" alt="말티즈 소개 사진">
      <h3>말티즈 소개</h3>
      <p>
        말티즈는 사람을 좋아하고 활발한 성격을 가진 반려견입니다.
      </p>
    </div>

    <div class="card">
      <h3>부산의 이슈</h3>
      <p>
        부산은 반려동물 문화 공간과 관광 산업 확대에 힘쓰고 있습니다.
      </p>
    </div>

    <div class="card">
      <h3>부경대 뉴스</h3>
      <p>
        부경대학교는 지역 사회와 연계한 활동을 확대하고 있습니다.
      </p>
    </div>

    <div class="card">
      <h3>사회복지 통계</h3>
      <p>
        고령화와 1인 가구 증가로 사회복지 중요성이 커지고 있습니다.
      </p>
    </div>

    <div class="card gallery-card">
      <h3>말티즈 갤러리 🐾</h3>

      <div class="gallery-images">
        <img src="./dog3.png" alt="말티즈 사진">
        <img src="./dog4.png" alt="말티즈 사진">
      </div>
    </div>

  </div>

</div>

<style>
  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
  }

  body {
    background: linear-gradient(to bottom, #fff1f1, #fffaf7);
    padding: 30px;
  }

  .container {
    max-width: 1300px;
    margin:auto;
  }

  .main-card {
    background:white;
    border-radius:35px;
    padding:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:40px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin-bottom:30px;
    flex-wrap:wrap;
  }

  .main-card img {
    width:350px;
    border-radius:30px;
  }

  .main-text h2 {
    font-size:45px;
    color:#df8e8e;
    margin-bottom:15px;
  }

  .main-text p {
    color:#666;
    margin-bottom:10px;
    font-size:17px;
  }

  .card-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:25px;
  }

  .card {
    background:white;
    border-radius:30px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
  }

  .card:hover {
    transform:translateY(-8px);
  }

  .card h3 {
    color:#df8e8e;
    margin-bottom:15px;
  }

  .card p {
    color:#666;
    line-height:1.7;
  }

  .card img {
    width:100%;
    border-radius:20px;
    margin-bottom:15px;
  }

  .gallery-card {
    grid-column: span 2;
  }

  .gallery-images {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
  }

  .gallery-images img {
    width:240px;
  }

  @media screen and (max-width:768px) {
    .gallery-card {
      grid-column: span 1;
    }

    .main-card img {
      width:100%;
    }
  }
</style>

</body>
</html>
