<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말티즈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f8ebe4, #fff7f2);
      overflow-x: hidden;
      color: #4b4b4b;
      line-height: 1.6;
    }

    header {
      width: 100%;
      padding: 18px 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f0d9cf;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #d48c8c;
      letter-spacing: 2px;
    }

    html {
      scroll-behavior: smooth;
    }

    nav a {
      text-decoration: none;
      color: #555;
      margin-left: 25px;
      font-size: 15px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #b18b76;
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 140px 8% 60px;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .text-box {
      flex: 1;
      min-width: 300px;
    }

    .text-box h1 {
      font-size: 70px;
      font-weight: 800;
      color: #d18b8b;
      margin-bottom: 18px;
      line-height: 1.1;
    }

    .text-box p {
      margin-bottom: 18px;
      color: #666;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 13px 30px;
      background-color: #ffb3b3;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255,179,179,0.4);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff9292;
    }

    .image-box {
      flex: 1;
      min-width: 320px;
      text-align: center;
    }

    .image-box img {
      width: 100%;
      max-width: 470px;
      border-radius: 30px;
      border: 8px solid white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .small-gallery {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .small-gallery img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
    }

    section {
      padding: 120px 8% 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .section-title {
      font-size: 32px;
      margin-bottom: 25px;
      color: #6d574d;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: rgba(255,255,255,0.92);
      padding: 28px;
      border-radius: 25px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card h3 {
      margin-bottom: 12px;
      color: #7b675d;
    }

    footer {
      text-align: center;
      padding: 25px;
      background-color: #e8dfd8;
      color: #666;
      margin-top: 40px;
    }

    @media screen and (max-width: 768px) {
      .text-box h1 {
        font-size: 42px;
      }

      nav a {
        margin-left: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🐶 Maltese</div>
  </header>

  <main class="card-layout">

    <div class="main-card large-card">
      <div class="text-box">
        <h1>말티즈</h1>
        <p>
          귀엽고 사랑스러운 말티즈를 소개하는 홈페이지입니다.
        </p>

        <p>
          부산 날씨 ☀️ 23°C
        </p>
      </div>

      <div class="image-box">
        <img src="./dog1.png" alt="메인 말티즈 이미지">
      </div>
    </div>

    <div class="card-grid">

      <div class="info-card">
        <img src="./dog2.png" alt="말티즈 소개 이미지">

        <h2>말티즈 소개</h2>

        <p>
          말티즈는 사람을 좋아하고 애교가 많은 반려견입니다.
          작은 체형 덕분에 실내 생활에도 잘 어울립니다.
        </p>
      </div>

      <div class="info-card">
        <h2>부산의 이슈</h2>

        <p>
          부산은 반려동물 문화 공간과 관광 산업 확대에 힘쓰고 있습니다.
        </p>
      </div>

      <div class="info-card">
        <h2>부경대 뉴스</h2>

        <p>
          부경대학교는 지역 사회와 협력한 교육 및 봉사 활동을 확대하고 있습니다.
        </p>
      </div>

      <div class="info-card">
        <h2>사회복지 통계</h2>

        <p>
          고령화와 1인 가구 증가로 사회복지 서비스 중요성이 커지고 있습니다.
        </p>
      </div>

      <div class="gallery-card">
        <h2>말티즈 갤러리 🐾</h2>

        <div class="gallery-images">
          <img src="./dog3.png" alt="말티즈 사진">
          <img src="./dog4.png" alt="말티즈 사진">
        </div>
      </div>

    </div>

  </main>

  <style>
    body {
      background: linear-gradient(to bottom, #fff3f3, #fffaf7);
      min-height: 100vh;
      padding: 40px;
    }

    header {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #e28f8f;
    }

    .card-layout {
      max-width: 1300px;
      margin: auto;
    }

    .large-card {
      background: white;
      border-radius: 35px;
      padding: 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 35px;
      flex-wrap: wrap;
    }

    .large-card img {
      width: 340px;
      border-radius: 28px;
      border: 8px solid #fff2f2;
    }

    .text-box h1 {
      font-size: 65px;
      color: #d88787;
      margin-bottom: 18px;
    }

    .text-box p {
      color: #666;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .info-card,
    .gallery-card {
      background: rgba(255,255,255,0.95);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .info-card:hover,
    .gallery-card:hover {
      transform: translateY(-8px);
    }

    .info-card h2,
    .gallery-card h2 {
      color: #d88787;
      margin-bottom: 18px;
    }

    .info-card p,
    .gallery-card p {
      color: #666;
      line-height: 1.7;
    }

    .info-card img {
      width: 100%;
      border-radius: 22px;
      margin-bottom: 18px;
    }

    .gallery-images {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .gallery-images img {
      width: 220px;
      border-radius: 24px;
      border: 6px solid #fff2f2;
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 20px;
      }

      .text-box h1 {
        font-size: 48px;
      }

      .large-card {
        padding: 28px;
      }

      .large-card img {
        width: 100%;
      }
    }
  </style>

</body>
</html>
